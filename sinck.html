<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯JS贪吃蛇游戏</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            background-color: #2c3e50;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        #gameCanvas {
            border: 2px solid #333;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        #scoreBoard {
            font-size: 20px;
            margin-top: 10px;
            color: #555;
        }

        .controls {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
        
        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>贪吃蛇</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="scoreBoard">得分: 0</div>
    <button onclick="resetGame()">重新开始</button>
    <div class="controls">使用方向键控制移动</div>

    <script>
        // 获取Canvas元素和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreBoard');

        // 游戏配置
        const gridSize = 20; // 每个格子的大小
        const tileCount = canvas.width / gridSize; // 格子数量 (20x20)
        
        // 游戏状态变量
        let score = 0;
        let velocityX = 0;
        let velocityY = 0;
        let snake = [];
        let food = { x: 15, y: 15 };
        let gameInterval;
        let isGameRunning = false;

        // 初始化游戏
        function initGame() {
            // 初始蛇的位置（中间）
            snake = [
                { x: 10, y: 10 }, // 头
                { x: 9, y: 10 },
                { x: 8, y: 10 }   // 尾
            ];
            
            // 初始向右移动
            velocityX = 1;
            velocityY = 0;
            
            score = 0;
            updateScore();
            placeFood();
            
            isGameRunning = true;
            
            // 清除旧的循环并开始新的循环
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 100); // 100ms 刷新一次，即每秒10帧
        }

        // 游戏主循环
        function gameLoop() {
            if (!isGameRunning) return;

            update();
            draw();
        }

        // 更新游戏逻辑
        function update() {
            // 计算新的头部位置
            const head = { x: snake[0].x + velocityX, y: snake[0].y + velocityY };

            // 1. 检查撞墙
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 2. 检查撞自己
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            // 将新头部加入数组前端
            snake.unshift(head);

            // 3. 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                placeFood();
                // 吃到食物不移除尾部，蛇变长
            } else {
                // 没吃到食物，移除尾部，保持长度不变
                snake.pop();
            }
        }

        // 绘制画面
        function draw() {
            // 清空画布
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画线
            ctx.storokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = 0; i < gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i*gridSize, 0)
                ctx.lineTo(i*gridSize, canvas.height)
                ctx.stroke(); 
                
                ctx.beginPath();
                ctx.moveTo(0, i*gridSize)
                ctx.lineTo(canvas.width, i*gridSize)
                ctx.stroke();
            }

            // 绘制蛇
            ctx.fillStyle = 'green';
            for (let i = 0; i < snake.length; i++) {
                // 头部颜色稍深，便于区分
                if (i === 0) ctx.fillStyle = '#2E7D32';
                else ctx.fillStyle = '#4CAF50';
                
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            }

            // 绘制食物
            let foodOfset = Math.sin(Date.now()) * 2
            let foodSize = gridSize - 4 + foodOfset;
            let offset = (gridSize - foodSize) / 2;

            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * gridSize + offset, food.y * gridSize+ offset, foodSize, foodSize);
        }

        // 随机放置食物
        function placeFood() {
            // 确保食物不会生成在蛇身上
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);

                validPosition = true;
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        validPosition = false;
                        break;
                    }
                }
            }
        }

        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameInterval);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'white';
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("游戏结束!", canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Arial';
            ctx.fillText("最终得分: " + score, canvas.width / 2, canvas.height / 2 + 40);
        }

        // 更新分数显示
        function updateScore() {
            scoreElement.innerText = '得分: ' + score;
        }

        // 重置游戏按钮调用
        function resetGame() {
            initGame();
        }

        // 键盘监听
        document.addEventListener('keydown', keyDownEvent);

        function keyDownEvent(e) {
            console.log(e.keyCode);
            
            // 防止按键导致页面滚动
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            // 改变方向，但不能直接反向移动（例如正在向右不能直接向左）
            switch (e.keyCode) {
                case 37: // Left
                    if (velocityX !== 1) {
                        velocityX = -1;
                        velocityY = 0;
                    }
                    break;
                case 38: // Up
                    if (velocityY !== 1) {
                        velocityX = 0;
                        velocityY = -1;
                    }
                    break;
                case 39: // Right
                    if (velocityX !== -1) {
                        velocityX = 1;
                        velocityY = 0;
                    }
                    break;
                case 40: // Down
                    if (velocityY !== -1) {
                        velocityX = 0;
                        velocityY = 1;
                    }
                    break;
            }
        }

        // 页面加载完成后启动游戏
        window.onload = initGame;

    </script>
</body>
</html>
