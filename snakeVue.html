<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级贪吃蛇 Pro - Vue3版</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
            font-family: 'Arial', sans-serif;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        canvas {
            border: 4px solid #34495e;
            background-color: #ecf0f1;
            display: block;
        }

        .ui-panel {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .status-bar {
            width: 100%;
            max-width: 600px;
            height: 20px;
            margin-bottom: 5px;
            color: #f1c40f;
            font-size: 14px;
            text-align: center;
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 12px;
            color: #bdc3c7;
            text-align: center;
        }
        
        .record-flash {
            animation: borderFlash 0.5s infinite alternate;
        }

        @keyframes borderFlash {
            from { border-color: #34495e; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
            to { border-color: #f1c40f; box-shadow: 0 0 30px #f1c40f; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="status-bar">{{ statusText }}</div>

        <div class="game-container" :class="{ 'record-flash': isNewRecord && celebrationTimer > 0 }" ref="gameContainerRef">
            <canvas ref="canvasRef" :width="canvasSize" :height="canvasSize"></canvas>
        </div>

        <div class="ui-panel">
            <div>得分: {{ score }}</div>
            <div>最高分: {{ highScore }}</div>
        </div>

        <div class="controls-hint">
            WASD / 方向键移动 | Shift 加速 | P / Space 暂停
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted, onBeforeUnmount, watch } = Vue;

        createApp({
            setup() {
                // --- DOM Refs ---
                const canvasRef = ref(null);
                const gameContainerRef = ref(null);
                let ctx = null;

                // --- 游戏配置常量 ---
                const GRID_SIZE = 20; 
                
                // --- 响应式状态 ---
                const canvasSize = ref(400);
                const score = ref(0);
                const highScore = ref(localStorage.getItem('snakeHighScore') || 0);
                const statusText = ref("");
                const isNewRecord = ref(false);
                const celebrationTimer = ref(0);

                let snake = [];
                let velocity = { x: 0, y: 0 };
                let food = { x: 15, y: 15, type: 'normal' };
                let obstacles = [];
                let particles = []; // 暂未实现粒子具体绘制，保留结构
                let activeEffects = { wallHack: 0, shrink: 0, grow: 0 };
                let lastFoodType = 'normal';
                let mapLevel = 0;
                let inputQueue = []; 
                
                let isGameRunning = false;
                let isPaused = false;
                let gameLoopId = null;
                let baseSpeed = 150;
                let currentSpeed = baseSpeed;
                let isAccelerating = false;
                let GRID_COUNT = 20; // 初始 400/20

                // --- 核心逻辑函数 ---

                function init() {
                    if (!canvasRef.value) return;
                    ctx = canvasRef.value.getContext('2d');

                    mapLevel = 0;
                    canvasSize.value = 400;
                    updateCanvasSize();
                    
                    let startX = Math.floor(GRID_COUNT / 2);
                    let startY = Math.floor(GRID_COUNT / 2);
                    snake = [
                        { x: startX, y: startY },
                        { x: startX - 1, y: startY },
                        { x: startX - 2, y: startY }
                    ];
                    
                    velocity = { x: 1, y: 0 };
                    inputQueue = [];
                    score.value = 0;
                    obstacles = [];
                    particles = [];
                    activeEffects = { wallHack: 0, shrink: 0, grow: 0 };
                    lastFoodType = 'normal';
                    isNewRecord.value = false;
                    celebrationTimer.value = 0;
                    statusText.value = "";
                    
                    if (gameContainerRef.value) {
                        gameContainerRef.value.classList.remove('record-flash');
                    }
                    
                    createFood();
                    isGameRunning = true;
                    isPaused = false;
                    
                    if (gameLoopId) clearTimeout(gameLoopId);
                    gameLoop();
                }

                function updateCanvasSize() {
                    GRID_COUNT = canvasSize.value / GRID_SIZE;
                }

                function gameLoop() {
                    if (!isGameRunning) return;

                    if (isPaused) {
                        drawPauseScreen();
                        gameLoopId = setTimeout(gameLoop, 100);
                        return;
                    }

                    update();
                    if (!isGameRunning) {
                        return; 
                    }
                    draw();
                    
                    let delay = currentSpeed;
                    if (isAccelerating) delay = Math.max(50, currentSpeed / 2);

                    handleEffects();

                    gameLoopId = setTimeout(gameLoop, delay);
                }

                function update() {
                    if (inputQueue.length > 0) {
                        const nextDir = inputQueue.shift();
                        if (nextDir.x + velocity.x !== 0 || nextDir.y + velocity.y !== 0) {
                            velocity = nextDir;
                        }
                    }

                    const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

                    // 碰撞检测 - 墙壁
                    if (activeEffects.wallHack > 0) {
                        if (head.x < 0) head.x = GRID_COUNT - 1;
                        if (head.x >= GRID_COUNT) head.x = 0;
                        if (head.y < 0) head.y = GRID_COUNT - 1;
                        if (head.y >= GRID_COUNT) head.y = 0;
                    } else {
                        if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
                            gameOver();
                            return;
                        }
                    }

                    // 碰撞检测 - 自身
                    for (let i = 0; i < snake.length; i++) {
                        if (head.x === snake[i].x && head.y === snake[i].y) {
                            gameOver();
                            return;
                        }
                    }

                    // 碰撞检测 - 障碍物
                    for (let obs of obstacles) {
                        if (head.x === obs.x && head.y === obs.y) {
                            gameOver();
                            return;
                        }
                    }

                    snake.unshift(head);

                    if (head.x === food.x && head.y === food.y) {
                        handleEatFood();
                    } else {
                        snake.pop();
                    }

                    if (isNewRecord.value && celebrationTimer.value > 0) {
                        celebrationTimer.value -= (isAccelerating ? Math.max(50, currentSpeed / 2) : currentSpeed);
                        if (celebrationTimer.value <= 0) {
                            if (gameContainerRef.value) {
                                gameContainerRef.value.classList.remove('record-flash');
                            }
                        }
                    }
                }

                function handleEatFood() {
                    lastFoodType = food.type;

                    let scoreAdd = 1;
                    if (food.type === 'gold') {
                        activeEffects.wallHack = 3000;
                        scoreAdd = 2;
                    } else if (food.type === 'blue') {
                        activeEffects.shrink = 3000;
                        for(let k=0; k<3; k++) {
                            if(snake.length > 3) snake.pop();
                        }
                        scoreAdd = 1;
                    } else if (food.type === 'purple') {
                        activeEffects.grow = 3000;
                        scoreAdd = 5;
                        snake.push({...snake[snake.length-1]});
                        snake.push({...snake[snake.length-1]});
                    }

                    updateScore(score.value + scoreAdd);
                    checkMapUpgrade();
                    
                    let targetObsCount = Math.max(0, Math.floor((score.value - 30) / 5));
                    if (obstacles.length < targetObsCount) {
                        createObstacle();
                    }

                    createFood();
                }

                function checkMapUpgrade() {
                    let newLevel = Math.floor(score.value / 10);
                    if (newLevel > mapLevel) {
                        mapLevel = newLevel;
                        canvasSize.value += 40;
                        updateCanvasSize();
                        celebrationTimer.value = 1000;
                        statusText.value = "地图扩大！";
                        setTimeout(() => {
                            celebrationTimer.value = 0;
                            statusText.value = "";
                        }, 1000);
                    }
                }

                function handleEffects() {
                    let frameTime = isAccelerating ? Math.max(50, currentSpeed / 2) : currentSpeed;

                    if (activeEffects.wallHack > 0) activeEffects.wallHack -= frameTime;
                    if (activeEffects.shrink > 0) activeEffects.shrink -= frameTime;
                    if (activeEffects.grow > 0) activeEffects.grow -= frameTime;

                    let text = "";
                    if (activeEffects.wallHack > 0) {
                        text += `👻 穿墙 ${(activeEffects.wallHack/1000).toFixed(1)}s `;
                    } else if (activeEffects.shrink > 0) {
                        text += `缩小${(activeEffects.shrink/1000).toFixed(1)}s`;
                    } else if (activeEffects.grow > 0) {
                        text += `放大${(activeEffects.grow/1000).toFixed(1)}s`;
                    }
                    
                    if (text === "" && celebrationTimer.value <= 0) {
                         statusText.value = "";
                    } else if (text !== "") {
                         statusText.value = text;
                    }
                }

                function draw() {
                    if (!ctx) return;
                    // 1. 背景
                    ctx.fillStyle = "#222";
                    ctx.fillRect(0, 0, canvasSize.value, canvasSize.value);
                    
                    ctx.strokeStyle = "#333";
                    ctx.lineWidth = 1;
                    for (let i = 0; i <= GRID_COUNT; i++) {
                        ctx.beginPath();
                        ctx.moveTo(i * GRID_SIZE, 0);
                        ctx.lineTo(i * GRID_SIZE, canvasSize.value);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(0, i * GRID_SIZE);
                        ctx.lineTo(canvasSize.value, i * GRID_SIZE);
                        ctx.stroke();
                    }

                    // 2. 障碍物
                    ctx.fillStyle = "#7f8c8d";
                    for (let obs of obstacles) {
                        ctx.fillRect(obs.x * GRID_SIZE, obs.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
                        ctx.strokeStyle = "#555";
                        ctx.beginPath();
                        ctx.moveTo(obs.x * GRID_SIZE, obs.y * GRID_SIZE);
                        ctx.lineTo((obs.x + 1) * GRID_SIZE, (obs.y + 1) * GRID_SIZE);
                        ctx.moveTo((obs.x + 1) * GRID_SIZE, obs.y * GRID_SIZE);
                        ctx.lineTo(obs.x * GRID_SIZE, (obs.y + 1) * GRID_SIZE);
                        ctx.stroke();
                    }

                    // 3. 食物
                    let pulse = Math.sin(Date.now() / 200) * 2;
                    let foodSize = GRID_SIZE - 4 + pulse;
                    let offset = (GRID_SIZE - foodSize) / 2;
                    
                    if (food.type === 'normal') ctx.fillStyle = "#e74c3c";
                    else if (food.type === 'gold') ctx.fillStyle = "#f1c40f";
                    else if (food.type === 'blue') ctx.fillStyle = "#3498db";
                    else if (food.type === 'purple') ctx.fillStyle = "#9b59b6";
                    
                    ctx.fillRect(food.x * GRID_SIZE + offset, food.y * GRID_SIZE + offset, foodSize, foodSize);

                    // 4. 蛇
                    let isBlinking = activeEffects.wallHack > 0 && activeEffects.wallHack < 1000 && Math.floor(Date.now() / 100) % 2 === 0;
                    let isGhost = activeEffects.wallHack > 0 && !isBlinking;

                    let snakeBaseColor = "#2ecc71";
                    if (lastFoodType === 'gold') snakeBaseColor = "#f1c40f";
                    else if (lastFoodType === 'blue') snakeBaseColor = "#3498db";
                    else if (lastFoodType === 'purple') snakeBaseColor = "#9b59b6";

                    for (let i = 0; i < snake.length; i++) {
                        let part = snake[i];
                        
                        if (isGhost) {
                            ctx.globalAlpha = 0.4;
                        } else {
                            ctx.globalAlpha = 1.0;
                        }

                        if (i === 0) {
                            ctx.fillStyle = snakeBaseColor;
                            if (isBlinking) ctx.fillStyle = "#fff";

                            ctx.fillRect(part.x * GRID_SIZE, part.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
                            
                            ctx.fillStyle = "white";
                            let eyeOffset = 4;
                            let eyeSize = 4;
                            let ex1, ey1, ex2, ey2;
                            if (velocity.x === 1) { ex1=12; ey1=4; ex2=12; ey2=12; }
                            else if (velocity.x === -1) { ex1=4; ey1=4; ex2=4; ey2=12; }
                            else if (velocity.y === -1) { ex1=4; ey1=4; ex2=12; ey2=4; }
                            else { ex1=4; ey1=12; ex2=12; ey2=12; }

                            ctx.fillRect(part.x * GRID_SIZE + ex1, part.y * GRID_SIZE + ey1, eyeSize, eyeSize);
                            ctx.fillRect(part.x * GRID_SIZE + ex2, part.y * GRID_SIZE + ey2, eyeSize, eyeSize);

                        } else {
                            ctx.fillStyle = snakeBaseColor;
                            if (lastFoodType === 'normal' || lastFoodType === 'purple') {
                                 let greenVal = Math.max(100, 200 - i * 5);
                                 if (snakeBaseColor === "#2ecc71") {
                                     ctx.fillStyle = `rgb(46, ${greenVal}, 113)`;
                                 } else {
                                     ctx.globalAlpha = 0.8; 
                                 }
                            }
                            ctx.fillRect(part.x * GRID_SIZE, part.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
                            ctx.globalAlpha = isGhost ? 0.4 : 1.0;
                        }
                    }
                    ctx.globalAlpha = 1.0;
                }

                function drawPauseScreen() {
                    if (!ctx) return;
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0,0,canvasSize.value, canvasSize.value);
                    ctx.fillStyle = 'white';
                    ctx.font = '30px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText("已暂停", canvasSize.value/2, canvasSize.value/2);
                }

                function createFood() {
                    let valid = false;
                    while (!valid) {
                        food.x = Math.floor(Math.random() * GRID_COUNT);
                        food.y = Math.floor(Math.random() * GRID_COUNT);
                        
                        let rand = Math.random();
                        if (rand < 0.8) food.type = 'normal';
                        else if (rand < 0.85) food.type = 'gold';
                        else if (rand < 0.90) food.type = 'blue';
                        else food.type = 'purple';

                        valid = true;
                        for (let part of snake) {
                            if (part.x === food.x && part.y === food.y) valid = false;
                        }
                        for (let obs of obstacles) {
                            if (obs.x === food.x && obs.y === food.y) valid = false;
                        }
                    }
                }

                function createObstacle() {
                    let valid = false;
                    let obs = {};
                    while (!valid) {
                        obs.x = Math.floor(Math.random() * GRID_COUNT);
                        obs.y = Math.floor(Math.random() * GRID_COUNT);
                        valid = true;
                        for (let part of snake) {
                            if (part.x === obs.x && part.y === obs.y) valid = false;
                        }
                        if (food.x === obs.x && food.y === obs.y) valid = false;
                        for (let o of obstacles) {
                            if (o.x === obs.x && o.y === obs.y) valid = false;
                        }
                        let dist = Math.abs(obs.x - snake[0].x) + Math.abs(obs.y - snake[0].y);
                        if (dist < 5) valid = false;
                    }
                    obstacles.push(obs);
                }

                function updateScore(newScore) {
                    score.value = newScore;
                    currentSpeed = Math.max(50, baseSpeed - Math.floor(score.value / 5) * 5);

                    if (score.value > highScore.value) {
                        if (!isNewRecord.value) {
                            isNewRecord.value = true;
                            celebrationTimer.value = 3000;
                            if (gameContainerRef.value) {
                                gameContainerRef.value.classList.add('record-flash');
                            }
                        }
                        highScore.value = score.value;
                        localStorage.setItem('snakeHighScore', highScore.value);
                    }
                }

                function gameOver() {
                    isGameRunning = false;
                    clearTimeout(gameLoopId);

                    if (!ctx) return;
                    ctx.save();
                    ctx.globalAlpha = 1.0; 
                    ctx.setTransform(1, 0, 0, 1, 0, 0); 
                    
                    ctx.fillStyle = "#222";
                    ctx.fillRect(0, 0, canvasSize.value, canvasSize.value);
                    
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0,0,canvasSize.value, canvasSize.value);
                    
                    ctx.fillStyle = '#e74c3c';
                    ctx.font = '40px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText("游戏结束", canvasSize.value/2, canvasSize.value/2 - 40);
                    
                    ctx.fillStyle = 'white';
                    ctx.font = '20px Arial';
                    ctx.fillText(`最终得分: ${score.value}`, canvasSize.value/2, canvasSize.value/2);
                    
                    if (isNewRecord.value) {
                        ctx.fillStyle = '#f1c40f';
                        ctx.font = '24px Arial';
                        ctx.fillText("🎉 新纪录！ 🎉", canvasSize.value/2, canvasSize.value/2 + 30);
                    }
                    
                    ctx.fillStyle = '#bdc3c7';
                    ctx.font = '16px Arial';
                    ctx.fillText("按 R 或 Enter 重新开始", canvasSize.value/2, canvasSize.value/2 + 70);

                    ctx.restore();
                    console.log("Game Over Displayed. Score:", score.value, "HighScore:", highScore.value, "IsNewRecord:", isNewRecord.value);
                }

                // --- 事件处理 ---
                function handleKeydown(e) {
                    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", " "].indexOf(e.code) > -1) {
                        e.preventDefault();
                    }

                    if (e.code === 'KeyP' || e.code === 'Space') {
                        if (isGameRunning) {
                            isPaused = !isPaused;
                        }
                        return;
                    }

                    if (!isGameRunning && (e.code === 'Enter' || e.code === 'KeyR')) {
                        init();
                        return;
                    }

                    if (!isGameRunning || isPaused) return;

                    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                        isAccelerating = true;
                    }

                    let desiredDir = null;
                    switch (e.key) {
                        case 'ArrowUp': case 'w': case 'W': desiredDir = { x: 0, y: -1 }; break;
                        case 'ArrowDown': case 's': case 'S': desiredDir = { x: 0, y: 1 }; break;
                        case 'ArrowLeft': case 'a': case 'A': desiredDir = { x: -1, y: 0 }; break;
                        case 'ArrowRight': case 'd': case 'D': desiredDir = { x: 1, y: 0 }; break;
                    }

                    if (desiredDir) {
                        const lastMove = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : velocity;
                        const isOpposite = (desiredDir.x + lastMove.x === 0 && desiredDir.y + lastMove.y === 0);
                        
                        if (!isOpposite) {
                            if (inputQueue.length < 2) {
                                inputQueue.push(desiredDir);
                            }
                        }
                    }
                }

                function handleKeyup(e) {
                    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                        isAccelerating = false;
                    }
                }

                onMounted(() => {
                    window.addEventListener('keydown', handleKeydown);
                    window.addEventListener('keyup', handleKeyup);
                    init();
                });

                onBeforeUnmount(() => {
                    window.removeEventListener('keydown', handleKeydown);
                    window.removeEventListener('keyup', handleKeyup);
                    if (gameLoopId) clearTimeout(gameLoopId);
                });

                return {
                    canvasRef,
                    gameContainerRef,
                    score,
                    highScore,
                    statusText,
                    isNewRecord,
                    celebrationTimer,
                    canvasSize
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
