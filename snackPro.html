<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级贪吃蛇 Pro</title>
</head>

<style>
    body {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #2c3e50; /* 页面背景深色 */
        font-family: 'Arial', sans-serif;
        color: white;
        margin: 0;
        overflow: hidden; /* 防止地图扩大时出现滚动条 */
    }

    .game-container {
        position: relative;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        transition: all 0.5s ease; /* 平滑过渡地图大小变化 */
    }

    canvas {
        border: 4px solid #34495e;
        background-color: #ecf0f1; /* 画布默认背景，会被JS覆盖 */
        display: block;
    }

    .ui-panel {
        width: 100%; /* 适应动态宽度 */
        max-width: 600px;
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        font-size: 18px;
        font-weight: bold;
        padding: 0 20px;
        box-sizing: border-box;
    }

    .status-bar {
        width: 100%;
        max-width: 600px;
        height: 20px;
        margin-bottom: 5px;
        color: #f1c40f;
        font-size: 14px;
        text-align: center;
    }

    /* 简单的按键提示 */
    .controls-hint {
        margin-top: 15px;
        font-size: 12px;
        color: #bdc3c7;
        text-align: center;
    }
    
    /* 破纪录闪烁动画类 */
    .record-flash {
        animation: borderFlash 0.5s infinite alternate;
    }

    @keyframes borderFlash {
        from { border-color: #34495e; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        to { border-color: #f1c40f; box-shadow: 0 0 30px #f1c40f; }
    }
</style>
<body>

    <div class="status-bar" id="statusBar"></div>

    <div class="game-container" id="gameContainer">
        <canvas width="400px" height="400px" id="canvas"></canvas>
    </div>

    <div class="ui-panel">
        <div id="scoreBoard">得分: 0</div>
        <div id="highScoreBoard">最高分: 0</div>
    </div>

    <div class="controls-hint">
        WASD / 方向键移动 | Shift 加速 | P / Space 暂停
    </div>

    <!-- 引入食物系统脚本 -->
    <script src="foodSystem.js"></script>

    <script>
        // --- DOM 元素获取 ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreBoard');
        const highScoreEl = document.getElementById('highScoreBoard');
        const statusBar = document.getElementById('statusBar');
        const gameContainer = document.getElementById('gameContainer');

        // --- 游戏配置常量 ---
        const GRID_SIZE = 20; // 每个网格的大小
        let CANVAS_SIZE = 400; // 画布初始大小
        let GRID_COUNT = CANVAS_SIZE / GRID_SIZE; // 网格数量
        
        // --- 新增：食物图片配置 ---
        // const USE_FOOD_IMAGES = true; // 控制是否使用图片的开关
        let FOOD_IMAGES_LOADED = {}; // 存储加载的食物图片

        // 预加载食物图片
        function preloadFoodImages() {
            if (!USE_FOOD_IMAGES) return;
            
            const foodTypes = ['normal', 'gold', 'blue', 'purple',  'reverse_dir', 'double'];
            
            foodTypes.forEach(type => {
                FOOD_IMAGES_LOADED[type] = new Image();
                FOOD_IMAGES_LOADED[type].src = `img/${type}.png`;
                
                FOOD_IMAGES_LOADED[type].onerror = function() {
                    console.warn(`Failed to load food image for type: ${type}`);
                };
            });
        }
        
        // 调用预加载函数
        preloadFoodImages();

        // --- 游戏状态变量 ---
        let snake = []; // 蛇身数组，每个元素为 {x, y}
        let velocity = { x: 0, y: 0 }; // 当前移动方向
        let obstacles = []; // 障碍物数组
        
        let score = 0; // 当前得分
        let highScore = localStorage.getItem('snakeHighScore') || 0; // 历史最高分
        highScoreEl.innerText = `最高分: ${highScore}`;

        let isGameRunning = false; // 游戏是否进行中
        let isPaused = false; // 是否暂停
        let gameLoopId = null; // 定时器ID
        
        // 速度控制
        let baseSpeed = 150; // 初始移动间隔(毫秒)
        let currentSpeed = baseSpeed; // 当前移动间隔
        let isAccelerating = false; // 是否按住加速键

        // 特效与道具状态
        let particles = []; // 粒子特效数组
        let activeEffects = {
            wallHack: 0, // 穿墙剩余时间 (毫秒)
            shrink: 0,   // 缩小剩余时间
            grow: 0,      // 变大/高分剩余时间
            reverse: 0    // 反向控制剩余时间
        };

        // 新增状态变量
        let lastFoodType = 'normal'; // 记录最后吃到的食物类型，用于改变蛇身颜色
        let mapLevel = 0; // 地图等级，每30分升一级
        let isNewRecord = false; // 本局是否打破纪录
        let celebrationTimer = 0; // 破纪录闪烁计时器

        // 缓存队列
        let inputQueue = []; 

        // 新增：食物管理器实例
        let foodManager = null;

        // --- 初始化函数 ---
        function init() {
            // 重置地图大小
            mapLevel = 0;
            CANVAS_SIZE = 400;
            updateCanvasSize();
            
            // 重置蛇的位置（居中）
            let startX = Math.floor(GRID_COUNT / 2);
            let startY = Math.floor(GRID_COUNT / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            
            velocity = { x: 1, y: 0 }; // 初始向右
            inputQueue = []; // 清空输入队列
            score = 0;
            obstacles = [];
            particles = [];
            activeEffects = { wallHack: 0, shrink: 0, grow: 0, reverse: 0 };
            lastFoodType = 'normal';
            isNewRecord = false;
            celebrationTimer = 0;
            
            // 移除可能的闪烁类
            gameContainer.classList.remove('record-flash');
            
            // 初始化食物管理器
            foodManager = new FoodManager(GRID_COUNT);
            foodManager.spawnNormalFood(snake, obstacles);

            updateScore(0);
            isGameRunning = true;
            isPaused = false;
            
            // 启动循环
            if (gameLoopId) clearTimeout(gameLoopId);
            gameLoop();
        }

        // --- 更新画布尺寸 ---
        function updateCanvasSize() {
            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;
            GRID_COUNT = CANVAS_SIZE / GRID_SIZE;
            if (foodManager) {
                foodManager.setGridCount(GRID_COUNT);
            }
        }

        // --- 核心游戏循环 ---
        function gameLoop() {
            if (!isGameRunning) return;

            if (isPaused) {
                drawPauseScreen();
                gameLoopId = setTimeout(gameLoop, 100);
                return;
            }

            update();
            if (!isGameRunning) {
                return; 
            }
            draw();
            
            // 计算下一帧的时间，如果按住Shift则加速
            let delay = currentSpeed;
            if (isAccelerating) delay = Math.max(50, currentSpeed / 2); // 加速最快50ms

            // 处理特效倒计时
            handleEffects();

            gameLoopId = setTimeout(gameLoop, delay);
        }

        // --- 逻辑更新 ---
        function update() {
            // 从输入队列中获取下一个合法的方向
            if (inputQueue.length > 0) {
                const nextDir = inputQueue.shift(); // 取出队列第一个指令
                
                // 检查新方向与当前方向是否相反
                if (nextDir.x + velocity.x !== 0 || nextDir.y + velocity.y !== 0) {
                    velocity = nextDir;
                } else if (snake.length > 1) {
                }
            }

            // 1计算新头部位置
            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

            //  碰撞检测 - 墙壁
            if (activeEffects.wallHack > 0) {
                // 穿墙模式：环绕处理
                if (head.x < 0) head.x = GRID_COUNT - 1;
                if (head.x >= GRID_COUNT) head.x = 0;
                if (head.y < 0) head.y = GRID_COUNT - 1;
                if (head.y >= GRID_COUNT) head.y = 0;
            } else {
                // 普通模式：撞墙死亡
                if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
                    gameOver();
                    return;
                }
            }

            //  碰撞检测 - 自身
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    // 为了游戏平衡，穿墙不免疫自撞
                    gameOver();
                    return;
                }
            }

            //  碰撞检测 - 障碍物
            for (let obs of obstacles) {
                if (head.x === obs.x && head.y === obs.y) {
                    gameOver();
                    return;
                }
            }

            //  移动蛇
            snake.unshift(head); // 加头

            //  吃食物检测 
            let eatenFood = foodManager.checkCollision(head);
            if (eatenFood) {
                handleEatFood(eatenFood);
            } else {
                snake.pop(); // 没吃到去尾
            }

            //  更新食物状态 
            if (foodManager) {
                foodManager.updateBadFoods(snake, obstacles, score);
                // 更新所有食物的计时器
                let allFoods = foodManager.getAllFoods();
                allFoods.forEach(f => f.update());
            }

            
            // 更新破纪录闪烁计时
            if (isNewRecord && celebrationTimer > 0) {
                celebrationTimer -= (isAccelerating ? Math.max(50, currentSpeed / 2) : currentSpeed);
                if (celebrationTimer <= 0) {
                    gameContainer.classList.remove('record-flash');
                }
            }
        }

        // --- 处理吃到食物 ---
        function handleEatFood(foodItem) {
            if (foodItem.type !== 'normal') {
                lastFoodType = foodItem.type;
            }

            // 根据食物类型应用效果
            let scoreAdd = 1;
            
            if (foodItem.type === 'normal') {
                scoreAdd = 1;
                // 吃普通果子时，尝试生成能力果实
                if (foodManager) {
                    foodManager.trySpawnPowerFood(snake, obstacles, score);
                }
            } 
            else if (foodItem.type === 'gold') {
                activeEffects.wallHack = 5000; // 5秒穿墙
                scoreAdd = 2;
                lastFoodType = 'gold';
            } 
            else if (foodItem.type === 'blue') {
                activeEffects.shrink = 5000; // 5秒缩小
                // 缩小：移除尾部3节，但不能少于3节
                for(let k=0; k<3; k++) {
                    if(snake.length > 3) snake.pop();
                }
                scoreAdd = 1;
                lastFoodType = 'blue';
            } 
            else if (foodItem.type === 'purple') {
                activeEffects.grow = 5000; // 5秒长大/双倍分数
                scoreAdd = 5; // 高分
                snake.push({...snake[snake.length-1]});
                snake.push({...snake[snake.length-1]});
                lastFoodType = 'purple';
            }
            else if (foodItem.type === 'double') {
                activeEffects.grow = 5000; 
                scoreAdd = 2; 
                lastFoodType = 'double';
            }
            else if (foodItem.type === 'bad') {
                // 坏果效果1：头尾互换
                snake.reverse();
                velocity.x = -velocity.x;
                velocity.y = -velocity.y;
                
                inputQueue = [];
                
                scoreAdd = 0; // 不得分
                statusBar.innerText = "⚠️ 头尾互换！";
                setTimeout(() => { if(statusBar.innerText === "⚠️ 头尾互换！") statusBar.innerText = ""; }, 1000);
                lastFoodType = 'bad';
            }
            else if (foodItem.type === 'reverse_dir') {
                // 坏果效果2：方向反转
                activeEffects.reverse = 3000; // 反向3秒
                scoreAdd = 0; // 不得分
                statusBar.innerText = "⚠️ 操作反向！";
                setTimeout(() => { if(statusBar.innerText === "⚠️ 操作反向！") statusBar.innerText = ""; }, 1000);
                lastFoodType = 'reverse_dir';
            }

            
           if (foodItem.type === 'double') {
                // 设置双倍分数标志
                activeEffects.doubleScore = 5000;
                scoreAdd *= 2;
            }

            updateScore(score + scoreAdd);
            
            checkMapUpgrade();
            
            // 障碍物生成，超过30分之后，每增加5分生成一个障碍物
            let targetObsCount = Math.max(0, Math.floor((score - 30) / 5));
            if (obstacles.length < targetObsCount) {
                createObstacle();
            }

            // 如果普通食物被吃了，需要重新生成普通食物
            if (foodItem.type === 'normal') {
                foodManager.spawnNormalFood(snake, obstacles);
            }
        }

        // --- 检查地图升级 ---
        function checkMapUpgrade() {
            let newLevel = Math.floor(score / 10);
            if (newLevel > mapLevel) {
                mapLevel = newLevel;
                // 每次升级，宽高各增加 2 个网格 (40px)
                CANVAS_SIZE += 40;
                updateCanvasSize();
                
                // 地图变大后，需要确保食物在新地图范围内，或者重新生成
                if (foodManager) {
                    foodManager.clearAndRespawn(snake, obstacles);
                }

                celebrationTimer = 1000
                statusBar.innerText = "地图扩大！";
                setTimeout(() => {
                    celebrationTimer = 0
                    statusBar.innerText = "";
                }, 1000);
            }
        }

        // --- 处理特效倒计时 ---
        function handleEffects() {
            // 简单处理：假设每次循环约等于 currentSpeed 毫秒
            let frameTime = isAccelerating ? Math.max(50, currentSpeed / 2) : currentSpeed;

            if (activeEffects.wallHack > 0) activeEffects.wallHack -= frameTime;
            if (activeEffects.shrink > 0) activeEffects.shrink -= frameTime;
            if (activeEffects.grow > 0) activeEffects.grow -= frameTime;
            if (activeEffects.doubleScore > 0) activeEffects.doubleScore -= frameTime;
            if (activeEffects.reverse > 0) activeEffects.reverse -= frameTime;

            // 如果所有效果都结束了，并且当前不是普通食物状态，恢复默认绿色
            if ((activeEffects.wallHack <= 0 && 
                 activeEffects.shrink <= 0 && 
                 activeEffects.grow <= 0 && 
                 activeEffects.doubleScore <= 0 &&
                 activeEffects.reverse <= 0) && 
                lastFoodType !== 'normal') {
                lastFoodType = 'normal';
            }

            // 更新状态栏文字
            let statusText = "";
            if (activeEffects.wallHack > 0) {
                statusText += `👻 穿墙 ${(activeEffects.wallHack/1000).toFixed(1)}s `;
            }
            if (activeEffects.shrink > 0) {
                statusText += `| 缩小 ${(activeEffects.shrink/1000).toFixed(1)}s `;
            } 
            if (activeEffects.grow > 0) {
                statusText += `| 放大 ${(activeEffects.grow/1000).toFixed(1)}s `;
            }
            if (activeEffects.doubleScore > 0) {
                statusText += `| x2分 ${(activeEffects.doubleScore/1000).toFixed(1)}s `;
            }
            if (activeEffects.reverse > 0) {
                statusText += `| ⚠️反向 ${(activeEffects.reverse/1000).toFixed(1)}s `;
            }

            // 只有在没有其它重要提示时才显示默认空，或者保留文字直到消失
            if (statusText === "" && celebrationTimer <= 0) {
                 statusBar.innerText = "";
            } else if (statusText !== "") {
                 statusBar.innerText = statusText;
            }
        }

        // --- 绘图渲染 ---
        function draw() {
            // 绘制背景 (网格)
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            
            // 画网格线
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * GRID_SIZE);
                ctx.stroke();
            }

            //  绘制障碍物
            ctx.fillStyle = "#7f8c8d";
            for (let obs of obstacles) {
                ctx.fillRect(obs.x * GRID_SIZE, obs.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
                // 给障碍物画个X
                ctx.strokeStyle = "#555";
                ctx.beginPath();
                ctx.moveTo(obs.x * GRID_SIZE, obs.y * GRID_SIZE);
                ctx.lineTo((obs.x + 1) * GRID_SIZE, (obs.y + 1) * GRID_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo((obs.x + 1) * GRID_SIZE, obs.y * GRID_SIZE);
                ctx.lineTo(obs.x * GRID_SIZE, (obs.y + 1) * GRID_SIZE);
                ctx.stroke();
            }

            //  绘制所有食物
            let allFoods = foodManager ? foodManager.getAllFoods() : [];
            for (let f of allFoods) {
                if (USE_FOOD_IMAGES && FOOD_IMAGES_LOADED[f.type]) {
                    // 使用图片模式绘制食物
                    let pulse = Math.sin(Date.now() / 200) * 2; // -2 到 2
                    let foodSize = GRID_SIZE - 4 + pulse;
                    let offset = (GRID_SIZE - foodSize) / 2;
                    
                    // 检查图片是否已加载完成
                    if (FOOD_IMAGES_LOADED[f.type].complete) {
                        ctx.drawImage(
                            FOOD_IMAGES_LOADED[f.type],
                            f.x * GRID_SIZE + offset,
                            f.y * GRID_SIZE + offset,
                            foodSize,
                            foodSize
                        );
                    } else {
                        // 如果图片未加载完成，回退到颜色块模式
                        ctx.fillStyle = f.getColor();
                        ctx.fillRect(f.x * GRID_SIZE + offset, f.y * GRID_SIZE + offset, foodSize, foodSize);
                    }
                } else {
                    // 使用原来的颜色块模式绘制食物
                    let pulse = Math.sin(Date.now() / 200) * 2; // -2 到 2
                    let foodSize = GRID_SIZE - 4 + pulse;
                    let offset = (GRID_SIZE - foodSize) / 2;
                    
                    ctx.fillStyle = f.getColor();
                    
                    // 特殊形状或标识
                    if (f.type === 'bad') {
                        // 坏果简单的暗色块
                        ctx.fillRect(f.x * GRID_SIZE + offset, f.y * GRID_SIZE + offset, foodSize, foodSize);
                        ctx.fillStyle = "black";
                        ctx.font = "10px Arial";
                        ctx.fillText("X", f.x * GRID_SIZE + 5, f.y * GRID_SIZE + 14);
                    } else {
                        ctx.fillRect(f.x * GRID_SIZE + offset, f.y * GRID_SIZE + offset, foodSize, foodSize);
                    }
                }
            }


            //  绘制蛇
            // 穿墙快结束时闪烁
            let isBlinking = activeEffects.wallHack > 0 && activeEffects.wallHack < 1000 && Math.floor(Date.now() / 100) % 2 === 0;
            let isGhost = activeEffects.wallHack > 0 && !isBlinking;

            // 确定蛇身基础颜色
            let snakeBaseColor = FOOD_COLORS[lastFoodType] || '#2ecc71';

            // 创建一个辅助函数来计算蛇身颜色的渐变
            function getShadedColor(baseColor, index, total) {
                // 解析十六进制颜色值
                let r = parseInt(baseColor.substring(1, 3), 16);
                let g = parseInt(baseColor.substring(3, 5), 16);
                let b = parseInt(baseColor.substring(5, 7), 16);
                
                // 计算渐变比例，越靠近尾巴越暗
                let shadeFactor = 0.3 + 0.7 * (1 - index / total);
                
                // 应用阴影因子
                r = Math.floor(r * shadeFactor);
                g = Math.floor(g * shadeFactor);
                b = Math.floor(b * shadeFactor);
                
                return `rgb(${r}, ${g}, ${b})`;
            }

            for (let i = 0; i < snake.length; i++) {
                let part = snake[i];
                
                if (isGhost) {
                    ctx.globalAlpha = 0.4; // 半透明
                } else {
                    ctx.globalAlpha = 1.0;
                }

                if (i === 0) {
                    ctx.fillStyle = snakeBaseColor;
                    if (isBlinking) ctx.fillStyle = "#fff";

                    ctx.fillRect(part.x * GRID_SIZE, part.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
                    
                    // 画眼睛
                    ctx.fillStyle = "white";
                    let eyeOffset = 4;
                    let eyeSize = 4;
                    // 根据方向调整眼睛位置
                    let ex1, ey1, ex2, ey2;
                    if (velocity.x === 1) { ex1=12; ey1=4; ex2=12; ey2=12; } // 右
                    else if (velocity.x === -1) { ex1=4; ey1=4; ex2=4; ey2=12; } // 左
                    else if (velocity.y === -1) { ex1=4; ey1=4; ex2=12; ey2=4; } // 上
                    else { ex1=4; ey1=12; ex2=12; ey2=12; } // 下 (默认)

                    ctx.fillRect(part.x * GRID_SIZE + ex1, part.y * GRID_SIZE + ey1, eyeSize, eyeSize);
                    ctx.fillRect(part.x * GRID_SIZE + ex2, part.y * GRID_SIZE + ey2, eyeSize, eyeSize);

                } else {
                    // 蛇身 - 使用渐变色
                    ctx.fillStyle = getShadedColor(snakeBaseColor, i, snake.length);
                    
                    ctx.fillRect(part.x * GRID_SIZE, part.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
                    ctx.globalAlpha = isGhost ? 0.4 : 1.0; // 恢复透明度设置
                }
            }
            ctx.globalAlpha = 1.0; // 恢复透明度

        }

        // --- 绘制暂停画面 ---
        function drawPauseScreen() {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0,0,CANVAS_SIZE, CANVAS_SIZE);
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("已暂停", CANVAS_SIZE/2, CANVAS_SIZE/2);
        }


        // 创建障碍物
        function createObstacle() {
            let valid = false;
            let obs = {};
            while (!valid) {
                obs.x = Math.floor(Math.random() * GRID_COUNT);
                obs.y = Math.floor(Math.random() * GRID_COUNT);
                valid = true;
                // 不能生成在蛇身上
                for (let part of snake) {
                    if (part.x === obs.x && part.y === obs.y) valid = false;
                }
                // 不能生成在食物上
                let allFoods = foodManager ? foodManager.getAllFoods() : [];
                for (let f of allFoods) {
                    if (f.x === obs.x && f.y === obs.y) valid = false;
                }
                // 不能生成在其他障碍物上
                for (let o of obstacles) {
                    if (o.x === obs.x && o.y === obs.y) valid = false;
                }
                // 最好离蛇头远一点，避免瞬间死亡
                let dist = Math.abs(obs.x - snake[0].x) + Math.abs(obs.y - snake[0].y);
                if (dist < 5) valid = false;
            }
            obstacles.push(obs);
        }

        // 更新分数
        function updateScore(newScore) {
            score = newScore;
            scoreEl.innerText = `得分: ${score}`;
            
            // 速度随分数增加而变快 (最快 50ms)
            // 每得5分，速度加快 5ms
            currentSpeed = Math.max(50, baseSpeed - Math.floor(score / 5) * 5);

            if (score > highScore) {
                // 打破纪录
                if (!isNewRecord) {
                    isNewRecord = true;
                    celebrationTimer = 3000; // 闪烁3秒
                    gameContainer.classList.add('record-flash');
                }
                highScore = score;
                highScoreEl.innerText = `最高分: ${highScore}`;
                localStorage.setItem('snakeHighScore', highScore);
            }
        }

        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearTimeout(gameLoopId); // 确保循环停止

            ctx.save();
            ctx.globalAlpha = 1.0; 
            ctx.setTransform(1, 0, 0, 1, 0, 0); // 重置变换矩阵
            
            
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            
            
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0,0,CANVAS_SIZE, CANVAS_SIZE);
            
            ctx.fillStyle = '#e74c3c';
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("游戏结束", CANVAS_SIZE/2, CANVAS_SIZE/2 - 40);
            
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText(`最终得分: ${score}`, CANVAS_SIZE/2, CANVAS_SIZE/2);
            
            if (isNewRecord) {
                ctx.fillStyle = '#f1c40f';
                ctx.font = '24px Arial';
                ctx.fillText("🎉 新纪录！ 🎉", CANVAS_SIZE/2, CANVAS_SIZE/2 + 30);
            }
            
            ctx.fillStyle = '#bdc3c7';
            ctx.font = '16px Arial';
            ctx.fillText("按 R 或 Enter 重新开始", CANVAS_SIZE/2, CANVAS_SIZE/2 + 70);

            ctx.restore();
            console.log("Game Over Displayed. Score:", score, "HighScore:", highScore, "IsNewRecord:", isNewRecord);

        }

        // --- 输入控制 ---
        document.addEventListener('keydown', (e) => {
            // 防止方向键滚动页面
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", " "].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            // 暂停控制
            if (e.code === 'KeyP' || e.code === 'Space') {
                if (isGameRunning) {
                    isPaused = !isPaused;
                    if (!isPaused) {
                    }
                }
                return;
            }

            // 重启控制
            if (!isGameRunning && (e.code === 'Enter' || e.code === 'KeyR')) {
                init();
                return;
            }

            if (!isGameRunning || isPaused) return;

            // 加速控制
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                isAccelerating = true;
            }

            // 方向控制 - 加入输入队列
            let desiredDir = null;
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    desiredDir = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    desiredDir = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    desiredDir = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    desiredDir = { x: 1, y: 0 };
                    break;
            }

            if (desiredDir) {
                // 如果处于反向控制状态，反转输入方向
                if (activeEffects.reverse > 0) {
                    desiredDir.x = -desiredDir.x;
                    desiredDir.y = -desiredDir.y;
                }

                const lastMove = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : velocity;
                
                // 判断是否与前一个预期方向相反
                const isOpposite = (desiredDir.x + lastMove.x === 0 && desiredDir.y + lastMove.y === 0);
                
                if (!isOpposite) {
                    // 只有当队列不满时才加入，防止按键积压过多导致延迟
                    if (inputQueue.length < 2) {
                        inputQueue.push(desiredDir);
                    }
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                isAccelerating = false;
            }
        });

        init();

    </script>
</body>
</html>
